services:
  - type: web
    name: venuxpay-api
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm run db:migrate && npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        fromDatabase:
          name: venuxpay-db
          property: connectionString
      - key: DB_SSL
        value: "true"
      - key: JWT_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: CORS_ORIGIN
        sync: false # set to your deployed frontend URL after first deploy
      - key: SELF_PING_URL
        sync: false # set to this service's own Render URL once deployed, e.g. https://venuxpay-api.onrender.com — keeps the free instance awake, see Go-Live Guide

databases:
  - name: venuxpay-db
    plan: free
    region: oregon
